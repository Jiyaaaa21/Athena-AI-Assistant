[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Phase 12: sqlalchemy.url is intentionally left blank here -- the real
# value comes from DATABASE_URL (core/config.py) via alembic/env.py, so the
# exact same env var that controls the running app also controls which
# database `alembic upgrade head` targets. This avoids the classic footgun
# of alembic.ini pointing at a different database than the app actually
# uses.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
