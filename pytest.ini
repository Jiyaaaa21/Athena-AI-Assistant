[pytest]
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Without this, `backend.*` imports in conftest.py and every test file
# fail with "ModuleNotFoundError: No module named 'backend'" when
# invoked as plain `pytest` from the repo root -- `python -m pytest`
# happens to auto-add the current directory to sys.path, which masked
# this during development, but plain `pytest` (the more common way
# people actually run it) does not do that the same way. This makes it
# work identically either way, and in CI, without relying on that
# invocation-specific behavior.
pythonpath = .

# Deprecation warnings from FastAPI's on_event() and a couple of
# Pydantic v1-style configs elsewhere in the app are pre-existing,
# unrelated to correctness, and not what this suite is here to catch --
# silenced so real warnings (from code these tests actually exercise)
# aren't lost in the noise.
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

    